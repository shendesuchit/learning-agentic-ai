schema_version: "1.0"

module:
  id: "04-langchain-fundamentals"
  title: "LangChain Fundamentals — From a Manual Agent Loop to a Harness"
  slug: "langchain-fundamentals"
  path: "04-langchain-fundamentals"
  sequence: 4
  status: "complete"
  difficulty: "beginner"
  estimated_learning_time: "2-3 hours"
  summary: "Bridges the repository's hand-built Python agent loop to LangChain's configurable agent harness. The module explains why frameworks become useful, separates model capability from harness responsibilities, maps the LangChain product family, establishes reproducible and secure project setup, and makes the create_agent execution loop visible through a runnable mock-weather-tool example."

repository:
  url: "https://github.com/shendesuchit/learning-agentic-ai"
  branch: "main"
  module_path: "04-langchain-fundamentals"
  metadata_path: "04-langchain-fundamentals/metadata.yaml"

audience:
  primary: "Fresh college graduate / Beginner"
  assumed_knowledge:
    - "Basic Python functions"
    - "Python virtual environments and package installation"
    - "Difference between an LLM, chatbot, and agent"
    - "Manual model-to-tool-to-model agentic loop"
  learning_style:
    - first_principles
    - progressive
    - beginner_friendly
    - visual

prerequisites:
  modules:
    - "02-agent-fundamentals"
    - "03-building-agents-in-pure-python"
  concepts:
    - "Tool schemas and structured arguments"
    - "Application-controlled tool execution"
    - "Conversation message state"
    - "Stopping conditions for an agentic loop"

learning_objectives:
  - "Explain when LangChain reduces repeated integration and orchestration work."
  - "Distinguish a language model from the harness surrounding an agent loop."
  - "Compare the roles of LangChain, LangGraph, Deep Agents, and LangSmith."
  - "Create a reproducible LangChain project without committing provider credentials."
  - "Trace the model-to-tool-to-model lifecycle performed during agent invocation."
  - "Identify which agent responsibilities remain explicit engineering decisions."

topics:
  primary:
    - "Why LangChain after a pure-Python agent"
    - "Agent as model plus harness"
    - "LangChain product-family responsibilities"
    - "Project setup with uv and environment variables"
    - "create_agent configuration and invocation"
    - "Agent component roadmap"
  secondary:
    - "Provider portability limits"
    - "Tool schema inference from Python callables"
    - "Message state"
    - "Explicit persistence and thread identity"
    - "Middleware responsibilities"
    - "Secret rotation after accidental exposure"
    - "Observability and evaluation"

learning_sequence:
  previous_module: "03-building-agents-in-pure-python"
  next_module: "05-langchain-model-layer"
  narrative_connection:
    from_previous: "Replaces repeated manual orchestration with a configurable framework harness while preserving the same model-to-tool-to-model mental model."
    to_next: "Moves from the high-level harness to detailed model configuration, message construction, execution modes, tool binding, and structured output."

